<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>命格言情 · 你们的故事</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
/* ─── Reset & Base ─── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ink: #1a1208;
  --paper: #f4efe6;
  --paper2: #ede7da;
  --rouge: #b83232;
  --gold: #a07820;
  --mist: #8a7d6b;
  --rule: #ccc0a8;
  --mono: 'DM Mono', monospace;
  --serif: 'Noto Serif SC', serif;
}
html { font-size: 16px; }
body {
  background: var(--paper);
  color: var(--ink);
  font-family: var(--serif);
  font-weight: 300;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ─── Grain overlay ─── */
body::after {
  content: '';
  position: fixed; inset: 0; pointer-events: none; z-index: 999;
  opacity: 0.025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

/* ─── Screen Manager ─── */
.screen { display: none; min-height: 100vh; }
.screen.active { display: flex; flex-direction: column; }

/* ─── SCREEN 0: Landing ─── */
#screen-landing {
  align-items: center; justify-content: center;
  text-align: center; padding: 60px 32px;
  background: var(--paper);
}
.landing-eyebrow {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.3em;
  text-transform: uppercase; color: var(--mist); margin-bottom: 24px;
}
.landing-title {
  font-size: clamp(36px, 8vw, 64px); font-weight: 600;
  line-height: 1.1; letter-spacing: -0.03em; margin-bottom: 16px;
}
.landing-title span { color: var(--rouge); }
.landing-sub {
  font-size: 15px; color: var(--mist); line-height: 1.8;
  max-width: 320px; margin: 0 auto 48px;
}
.btn-start {
  display: inline-flex; align-items: center; gap: 10px;
  background: var(--ink); color: var(--paper);
  font-family: var(--mono); font-size: 12px; letter-spacing: 0.15em;
  text-transform: uppercase; padding: 14px 32px; border-radius: 2px;
  border: none; cursor: pointer; transition: opacity 0.2s;
}
.btn-start:hover { opacity: 0.8; }
.landing-deco {
  margin-top: 64px; font-family: var(--mono); font-size: 10px;
  color: var(--rule); letter-spacing: 0.2em;
}

/* ─── SCREEN 1: Config ─── */
#screen-config { padding: 0; }
.config-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 24px; border-bottom: 1px solid var(--rule);
  position: sticky; top: 0; background: var(--paper); z-index: 10;
}
.config-logo { font-family: var(--mono); font-size: 11px; color: var(--mist); letter-spacing: 0.2em; }
.config-step { font-family: var(--mono); font-size: 10px; color: var(--rule); }

.config-body { flex: 1; padding: 32px 24px 120px; max-width: 560px; margin: 0 auto; width: 100%; }

/* Section headers */
.sec-label {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.25em;
  text-transform: uppercase; color: var(--rouge); margin-bottom: 16px;
  display: flex; align-items: center; gap: 10px;
}
.sec-label::after { content: ''; flex: 1; height: 1px; background: var(--rule); }
.sec-block { margin-bottom: 40px; }

/* Role columns */
.role-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.role-col-label {
  font-family: var(--mono); font-size: 10px; color: var(--mist);
  letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 8px;
  text-align: center;
}

/* Select field */
.field { margin-bottom: 10px; }
.field label {
  display: block; font-family: var(--mono); font-size: 10px;
  color: var(--mist); letter-spacing: 0.12em; text-transform: uppercase;
  margin-bottom: 5px;
}
.field select {
  width: 100%; padding: 9px 12px;
  background: var(--paper2); border: 1px solid var(--rule);
  border-radius: 3px; font-family: var(--serif); font-size: 13px;
  color: var(--ink); appearance: none;
  background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%238a7d6b' stroke-width='1.5' fill='none' stroke-linecap='round'/%3E%3C/svg%3E");
  background-repeat: no-repeat; background-position: right 12px center;
  cursor: pointer; transition: border-color 0.15s;
}
.field select:focus { outline: none; border-color: var(--ink); }

/* Tooltip for mingge relations */
.tooltip-wrap { position: relative; display: inline-block; }
.tooltip-icon {
  display: inline-flex; align-items: center; justify-content: center;
  width: 14px; height: 14px; border-radius: 50%;
  border: 1px solid var(--rule); font-family: var(--mono);
  font-size: 9px; color: var(--mist); cursor: pointer; margin-left: 4px;
  vertical-align: middle;
}
.tooltip-box {
  display: none; position: absolute; left: 0; top: 20px;
  background: var(--ink); color: var(--paper);
  font-size: 11px; line-height: 1.6; padding: 10px 14px;
  border-radius: 4px; width: 200px; z-index: 20;
  font-family: var(--serif); font-weight: 300;
}
.tooltip-wrap:hover .tooltip-box,
.tooltip-wrap:focus-within .tooltip-box { display: block; }

/* Story tone selector */
.tone-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.tone-card {
  border: 1px solid var(--rule); border-radius: 4px; padding: 14px 10px;
  text-align: center; cursor: pointer; transition: all 0.15s;
  background: var(--paper2);
}
.tone-card:hover { border-color: var(--ink); }
.tone-card.selected { border-color: var(--ink); background: var(--ink); color: var(--paper); }
.tone-card.selected .tone-sub { color: rgba(255,255,255,0.5); }
.tone-name { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
.tone-sub { font-family: var(--mono); font-size: 10px; color: var(--mist); }

/* Template selector */
.tpl-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.tpl-card {
  border: 1px solid var(--rule); border-radius: 4px; overflow: hidden;
  cursor: pointer; transition: all 0.15s;
}
.tpl-card:hover { border-color: var(--ink); transform: translateY(-1px); }
.tpl-card.selected { border: 2px solid var(--rouge); }
.tpl-preview { height: 80px; display: flex; align-items: center; justify-content: center; }
.tpl-preview-plain { background: #0f0f0f; }
.tpl-preview-sweet { background: #faf8f2; border-bottom: 1px solid #e8e0d0; }
.tpl-preview-dark {
  background: #0a0e14;
  position: relative; overflow: hidden;
}
.tpl-preview-dark::before {
  content: ''; position: absolute; width: 60px; height: 60px;
  background: rgba(40,80,140,0.4); border-radius: 50%;
  filter: blur(20px); top: -10px; right: 5px;
}
.tpl-preview-dark::after {
  content: ''; position: absolute; width: 40px; height: 40px;
  background: rgba(100,40,80,0.35); border-radius: 50%;
  filter: blur(16px); bottom: 0; left: 0;
}
.tpl-dot { width: 6px; height: 6px; border-radius: 50%; }
.tpl-dot-plain { background: #e8e8e8; }
.tpl-dot-sweet { background: #b09878; }
.tpl-dot-dark { background: #4a6080; position: relative; z-index: 1; }
.tpl-name { font-family: var(--mono); font-size: 10px; color: var(--mist); text-align: center; padding: 8px 4px; letter-spacing: 0.1em; }

/* Trigger category tabs */
.trigger-cats {
  display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px;
}
.trigger-cat-btn {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em;
  padding: 4px 10px; border-radius: 20px; border: 1px solid var(--rule);
  background: var(--paper2); color: var(--mist); cursor: pointer;
  transition: all 0.15s; white-space: nowrap;
}
.trigger-cat-btn:hover { border-color: var(--ink); color: var(--ink); }
.trigger-cat-btn.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }

/* Trigger words */
.trigger-pool { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; min-height: 36px; }
.trigger-chip {
  padding: 5px 12px; border: 1px solid var(--rule); border-radius: 20px;
  font-size: 12px; cursor: pointer; transition: all 0.15s; background: var(--paper2);
}
.trigger-chip:hover { border-color: var(--ink); }
.trigger-chip.selected { background: var(--rouge); color: var(--paper); border-color: var(--rouge); }
.trigger-cat-hint {
  font-family: var(--mono); font-size: 10px; color: var(--mist);
  margin-bottom: 8px; letter-spacing: 0.05em; line-height: 1.6;
}
.trigger-refresh {
  font-family: var(--mono); font-size: 10px; color: var(--mist);
  background: none; border: none; cursor: pointer; letter-spacing: 0.1em;
  padding: 4px 0; text-decoration: underline; text-underline-offset: 3px;
}
.trigger-refresh:hover { color: var(--ink); }

/* Generate button */
.config-footer {
  position: fixed; bottom: 0; left: 0; right: 0;
  padding: 16px 24px; background: var(--paper);
  border-top: 1px solid var(--rule); z-index: 10;
}
.btn-generate {
  width: 100%; padding: 16px; background: var(--ink); color: var(--paper);
  border: none; border-radius: 3px; font-family: var(--mono);
  font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase;
  cursor: pointer; transition: opacity 0.2s;
}
.btn-generate:hover { opacity: 0.85; }
.btn-generate:disabled { opacity: 0.4; cursor: not-allowed; }

/* ─── SCREEN 2: Generating ─── */
#screen-generating {
  align-items: center; justify-content: center;
  text-align: center; padding: 60px 32px;
}
.gen-label {
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.2em;
  color: var(--mist); margin-bottom: 32px; text-transform: uppercase;
}
.gen-dots { display: flex; gap: 8px; justify-content: center; margin-bottom: 40px; }
.gen-dot {
  width: 6px; height: 6px; border-radius: 50%; background: var(--rule);
  animation: pulse 1.2s ease-in-out infinite;
}
.gen-dot:nth-child(2) { animation-delay: 0.2s; }
.gen-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes pulse {
  0%, 100% { background: var(--rule); transform: scale(1); }
  50% { background: var(--ink); transform: scale(1.3); }
}
.gen-haiku { font-size: 14px; color: var(--mist); line-height: 2.2; font-style: italic; }

/* ─── SCREEN 3: Result ─── */
#screen-result { padding: 0; }
.result-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px; border-bottom: 1px solid var(--rule);
  position: sticky; top: 0; background: var(--paper); z-index: 10;
}
.btn-back {
  font-family: var(--mono); font-size: 10px; color: var(--mist);
  background: none; border: none; cursor: pointer; letter-spacing: 0.1em;
  text-transform: uppercase;
}
.btn-back:hover { color: var(--ink); }
.result-actions { display: flex; gap: 8px; }
.btn-action {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em;
  text-transform: uppercase; padding: 8px 14px; border-radius: 2px;
  cursor: pointer; transition: all 0.15s;
}
.btn-save {
  background: var(--ink); color: var(--paper); border: 1px solid var(--ink);
}
.btn-save:hover { opacity: 0.8; }
.btn-regen {
  background: transparent; color: var(--mist); border: 1px solid var(--rule);
}
.btn-regen:hover { border-color: var(--ink); color: var(--ink); }

.result-body { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 32px 20px 80px; }
.result-hint { font-family: var(--mono); font-size: 10px; color: var(--mist); margin-bottom: 20px; letter-spacing: 0.15em; text-transform: uppercase; }

/* ─── CARD STYLES ─── */
.story-card {
  width: 100%; max-width: 360px; border-radius: 10px;
  padding: 28px 24px 22px; position: relative; overflow: hidden;
}

/* Plain */
.card-plain {
  background: #0f0f0f; color: #e4e4e4;
  border: 1px solid #222;
}
.card-plain .card-type {
  font-family: var(--mono); font-size: 9px; letter-spacing: 0.25em;
  color: #444; text-transform: uppercase; margin-bottom: 14px;
}
.card-plain .card-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 14px; }
.card-plain .card-tag {
  font-family: var(--mono); font-size: 10px; border: 1px solid #2a2a2a;
  padding: 1px 8px; border-radius: 2px; color: #666;
}
.card-plain .card-divider { height: 1px; background: #1e1e1e; margin-bottom: 16px; }
.card-plain .card-story { font-size: 13px; line-height: 2; color: #ccc; margin-bottom: 18px; }
.card-plain .card-footer { display: flex; justify-content: flex-end; align-items: center; gap: 10px; }
.card-plain .card-watermark { font-family: var(--mono); font-size: 9px; color: #333; }

/* Sweet */
.card-sweet {
  background: #faf8f2; color: #3a3020;
  box-shadow: 0 2px 12px rgba(0,0,0,0.1);
  border: 1px solid #e8e0d0;
}
.card-sweet::before {
  content: ''; position: absolute; inset: 10px;
  border: 1px solid rgba(180,160,120,0.2); border-radius: 4px; pointer-events: none;
}
.card-sweet .card-type {
  font-family: var(--mono); font-size: 9px; letter-spacing: 0.2em;
  color: #c0a888; text-transform: uppercase; margin-bottom: 14px;
}
.card-sweet .card-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 14px; }
.card-sweet .card-tag {
  font-family: var(--mono); font-size: 10px; background: #f0ebe0;
  color: #8a7860; padding: 1px 8px; border-radius: 2px;
}
.card-sweet .card-divider { height: 1px; background: #ede6d8; margin-bottom: 16px; }
.card-sweet .card-story { font-size: 13px; line-height: 2.1; color: #4a3f30; margin-bottom: 18px; }
.card-sweet .card-footer { display: flex; justify-content: space-between; align-items: flex-end; }
.card-sweet .card-date { font-family: var(--mono); font-size: 9px; color: #c0a888; }
/* grain on sweet */
.card-sweet::after {
  content: ''; position: absolute; inset: 0; border-radius: 10px;
  pointer-events: none; opacity: 0.035;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

/* Dark */
.card-dark {
  background: #080c12; color: #8aa0b8;
  border: 1px solid #141c28;
}
.card-dark .bokeh {
  position: absolute; border-radius: 50%; pointer-events: none; filter: blur(32px);
}
.card-dark .bk1 { width: 100px; height: 100px; background: rgba(30,70,140,0.38); top: -30px; right: -10px; }
.card-dark .bk2 { width: 70px; height: 70px; background: rgba(110,30,70,0.32); bottom: 10px; left: -20px; }
.card-dark .bk3 { width: 50px; height: 50px; background: rgba(20,60,120,0.22); top: 80px; left: 10px; }
.card-dark .rain-layer { position: absolute; inset: 0; overflow: hidden; border-radius: 10px; pointer-events: none; opacity: 0.06; }
.card-dark .card-type {
  font-family: var(--mono); font-size: 9px; letter-spacing: 0.25em;
  color: #2a3a55; text-transform: uppercase; margin-bottom: 14px; position: relative;
}
.card-dark .card-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 14px; position: relative; }
.card-dark .card-tag {
  font-family: var(--mono); font-size: 10px; border: 1px solid #1e2e45;
  padding: 1px 8px; border-radius: 2px; color: #3a5070;
}
.card-dark .card-divider { height: 1px; background: #121e2e; margin-bottom: 16px; position: relative; }
.card-dark .card-story { font-size: 13px; line-height: 2.1; color: #7a96b2; margin-bottom: 18px; position: relative; }
.card-dark .card-footer { display: flex; justify-content: flex-end; align-items: center; position: relative; }

/* QR placeholder */
.qr-wrap { width: 40px; height: 40px; }
.qr-wrap canvas, .qr-wrap img { width: 40px !important; height: 40px !important; border-radius: 2px; }

/* ─── Misc ─── */
.optional-badge {
  font-family: var(--mono); font-size: 9px; color: var(--mist);
  letter-spacing: 0.1em; margin-left: 6px; vertical-align: middle;
}
.mingge-system-tabs { display: flex; gap: 0; margin-bottom: 14px; border: 1px solid var(--rule); border-radius: 3px; overflow: hidden; }
.sys-tab {
  flex: 1; text-align: center; padding: 8px 4px; font-family: var(--mono);
  font-size: 10px; letter-spacing: 0.1em; color: var(--mist); cursor: pointer;
  background: var(--paper2); border: none; transition: all 0.15s;
}
.sys-tab.active { background: var(--ink); color: var(--paper); }
.sys-panel { display: none; }
.sys-panel.active { display: block; }
</style>
</head>
<body>

<!-- ══════════════════════════════
     SCREEN 0: LANDING
══════════════════════════════ -->
<div id="screen-landing" class="screen active">
  <div class="landing-eyebrow">命格言情生成器</div>
  <h1 class="landing-title">两个人<span>·</span><br>一段命</h1>
  <p class="landing-sub">选一套命理，配两个人，<br>让故事自己找到方向。</p>
  <button class="btn-start" onclick="showScreen('config')">
    开始配对 →
  </button>
  <div class="landing-deco">— 轻甜 · 虐恋 · 虐文 —</div>
</div>

<!-- ══════════════════════════════
     SCREEN 1: CONFIG
══════════════════════════════ -->
<div id="screen-config" class="screen">
  <div class="config-header">
    <span class="config-logo">命格言情</span>
    <span class="config-step">选配角色</span>
  </div>

  <div class="config-body">

    <!-- ① 命格系统 -->
    <div class="sec-block">
      <div class="sec-label">① 命格体系 <span class="optional-badge">选填</span></div>
      <div class="mingge-system-tabs">
        <button class="sys-tab active" onclick="switchSystem('none')">不选</button>
        <button class="sys-tab" onclick="switchSystem('tiangan')">天干地支</button>
        <button class="sys-tab" onclick="switchSystem('mbti')">MBTI</button>
        <button class="sys-tab" onclick="switchSystem('xingzuo')">星座</button>
      </div>
      <div class="role-grid">
        <div>
          <div class="role-col-label">角色 A</div>
          <div id="sys-panel-a" class="sys-panel active">
            <!-- populated by JS -->
          </div>
        </div>
        <div>
          <div class="role-col-label">角色 B</div>
          <div id="sys-panel-b" class="sys-panel active">
          </div>
        </div>
      </div>
    </div>

    <!-- ② 命格关系 -->
    <div class="sec-block" id="block-mingge-rel" style="display:none">
      <div class="sec-label">② 命格关系 <span class="optional-badge">进阶·选填</span></div>
      <div class="field">
        <label>
          A × B 之间的关系
          <span class="tooltip-wrap">
            <span class="tooltip-icon">?</span>
            <span class="tooltip-box" id="rel-tooltip">选择关系后查看说明</span>
          </span>
        </label>
        <select id="sel-rel" onchange="updateRelTooltip()">
          <option value="">— 不选 —</option>
          <option value="印星" data-desc="滋养型：一方天然滋养另一方，被爱的人容易依赖，给爱的人容易失去自我。">印星关系</option>
          <option value="七杀" data-desc="张力型：像磁铁两极，靠近时有强烈磁力，却也互相消耗，难以平静共存。">七杀关系</option>
          <option value="比肩" data-desc="镜像型：同类相遇，惺惺相惜，却也暗含竞争，彼此都是对方的镜子。">比肩关系</option>
          <option value="食伤" data-desc="创作型：一方激发另一方的表达欲，关系里充满灵感与创造力，也有失控的边缘。">食伤关系</option>
          <option value="财星" data-desc="追逐型：一方主动追求，另一方被动承受，权力不对等却有奇异的吸引力。">财星关系</option>
        </select>
      </div>
    </div>

    <!-- ③ 家庭背景 -->
    <div class="sec-block">
      <div class="sec-label">③ 家庭背景 <span class="optional-badge">选填</span></div>
      <div class="role-grid">
        <div>
          <div class="role-col-label">角色 A</div>
          <div class="field">
            <label>性别</label>
            <select id="sel-gender-a">
              <option value="">— 不指定 —</option>
              <option value="男">男</option>
              <option value="女">女</option>
            </select>
          </div>
          <div class="field">
            <select id="sel-family-a">
              <option value="">— 不选 —</option>
              <option>独生子女</option>

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  window.scrollTo(0, 0);
}

// ══════════════════════════════
// MINGGE SYSTEM
// ══════════════════════════════
function switchSystem(sys) {
  currentSystem = sys;
  document.querySelectorAll('.sys-tab').forEach((t, i) => {
    const map = ['none', 'tiangan', 'mbti', 'xingzuo'];
    t.classList.toggle('active', map[i] === sys);
  });
  renderSystemPanels();
  document.getElementById('block-mingge-rel').style.display = sys !== 'none' ? 'block' : 'none';
}

function renderSystemPanels() {
  ['a','b'].forEach(role => {
    const panel = document.getElementById('sys-panel-' + role);
    if (currentSystem === 'none') { panel.innerHTML = ''; return; }
    let opts = '';
    const list = currentSystem === 'tiangan' ? TIANGAN : currentSystem === 'mbti' ? MBTI_LIST : XINGZUO;
    opts = `<option value="">— 不选 —</option>` + list.map(v => `<option>${v}</option>`).join('');
    const label = currentSystem === 'tiangan' ? '天干' : currentSystem === 'mbti' ? 'MBTI' : '星座';
    panel.innerHTML = `<div class="field"><label>${label}</label><select id="sel-mingge-${role}">${opts}</select></div>`;
  });
}

  document.getElementById('rel-tooltip').textContent = desc;
}

// ══════════════════════════════
// TRIGGERS
// ══════════════════════════════
let activeCatId = null;
let currentTriggers = [];
let selectedTrigger = null;

function initTriggerCats() {
  const wrap = document.getElementById('trigger-cats');
  // "全部随机" button
  const allBtn = document.createElement('button');
  allBtn.className = 'trigger-cat-btn active';
  allBtn.textContent = '全部随机';
  allBtn.dataset.cat = '';
  allBtn.onclick = () => selectCat(null, allBtn);
  wrap.appendChild(allBtn);

  TRIGGER_CATEGORIES.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'trigger-cat-btn';
    btn.textContent = cat.name;
    btn.dataset.cat = cat.id;
    btn.onclick = () => selectCat(cat.id, btn);
    wrap.appendChild(btn);
  });
  shuffleTriggers();
}

function selectCat(catId, btn) {
  activeCatId = catId;
  selectedTrigger = null;
  document.querySelectorAll('.trigger-cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const cat = TRIGGER_CATEGORIES.find(c => c.id === catId);
  document.getElementById('trigger-cat-hint').textContent = cat ? cat.hint : '';
  shuffleTriggers();
}

function shuffleTriggers() {
  const pool = activeCatId
    ? TRIGGER_CATEGORIES.find(c => c.id === activeCatId)?.words || []
    : ALL_TRIGGERS;
  currentTriggers = [...pool].sort(() => Math.random() - 0.5).slice(0, 6);
  selectedTrigger = null;
  renderTriggers();
}

function renderTriggers() {
  const wrap = document.getElementById('trigger-pool');
  wrap.innerHTML = '';
  currentTriggers.forEach(t => {
    const chip = document.createElement('span');
    chip.className = 'trigger-chip' + (selectedTrigger === t ? ' selected' : '');
    chip.textContent = t;
    chip.onclick = () => {
      selectedTrigger = selectedTrigger === t ? null : t;
      renderTriggers();
    };
    wrap.appendChild(chip);
  });
}

// ══════════════════════════════
// TONE & TEMPLATE

  document.querySelectorAll('.tone-card').forEach(c => c.classList.remove('selected'));

function selectTpl(el) {
  document.querySelectorAll('.tpl-card').forEach(c => c.classList.remove('selected'));

}

// ══════════════════════════════
// BUILD PROMPT
// ══════════════════════════════
function buildPrompt(cfg) {
  const parts = [];

  // 从关系类型推断默认性别
  if (cfg.relType === '耽美') {
    cfg.genderA = cfg.genderA || '男';
    cfg.genderB = cfg.genderB || '男';
  } else if (cfg.relType === '百合') {
    cfg.genderA = cfg.genderA || '女';
    cfg.genderB = cfg.genderB || '女';
  }

  // 角色称呼
  const pronounA = cfg.genderA === '男' ? '（他）' : cfg.genderA === '女' ? '（她）' : '';
  const pronounB = cfg.genderB === '男' ? '（他）' : cfg.genderB === '女' ? '（她）' : '';
  const nameA = cfg.minggeA ? `${cfg.minggeA}${pronounA}`
              : cfg.jobA ? `${cfg.jobA}${pronounA}`
              : cfg.genderA === '男' ? '他'
              : cfg.genderA === '女' ? '她'
              : '对方';
  const nameB = cfg.minggeB ? `${cfg.minggeB}${pronounB}`
              : cfg.jobB ? `${cfg.jobB}${pronounB}`
              : cfg.genderB === '男' ? '他'
              : cfg.genderB === '女' ? '她'
              : '对方';

  // 角色A描述
  let descA = '角色A';
  if (cfg.minggeA) descA += `（${cfg.minggeA}）`;
  if (cfg.classA) descA += `，${cfg.classA}`;
  if (cfg.jobA) descA += `${cfg.jobA}`;
  if (cfg.familyA) descA += `，${cfg.familyA}`;

  // 角色B描述
  let descB = '角色B';
  if (cfg.minggeB) descB += `（${cfg.minggeB}）`;
  if (cfg.classB) descB += `，${cfg.classB}`;
  if (cfg.jobB) descB += `${cfg.jobB}`;
  if (cfg.familyB) descB += `，${cfg.familyB}`;

  parts.push(`两个人的信息：\n- ${descA}\n- ${descB}`);

  if (cfg.rel) {
    const relDescs = {
      '印星': '两人之间是印星关系，一方天然滋养另一方，有依赖与失去自我的张力',
      '七杀': '两人之间是七杀关系，磁力强烈却互相消耗，难以平静共存',
      '比肩': '两人之间是比肩关系，同类相遇，惺惺相惜，暗含竞争',
      '食伤': '两人之间是食伤关系，一方激发另一方的表达欲，有失控的边缘',
      '财星': '两人之间是财星关系，权力不对等，一方追逐，一方被动承受',
    };
    parts.push(relDescs[cfg.rel] || '');
  }

  parts.push(`关系类型：${cfg.relType}`);
  parts.push(`触发事件：「${cfg.trigger}」`);

  // 基调指令
  const toneInstructions = {
    '轻甜': '故事基调：轻甜暧昧。聚焦心跳时刻、眼神交汇、克制的心理独白。有情绪流动但不直白表白。结尾留有余味。',
    '虐恋': '故事基调：虐恋。聚焦错过、误解、说不出口的话。两人之间有强烈情感但被某种障碍阻隔。结尾不需要HE，但情绪必须有回响。',
    '虐文': '故事基调：虐文，允许BE。可以有失去感、牺牲、永别。情感必须真实撕裂，不能煽情，要克制地痛。最后一句话要有分量。',
  };
  parts.push(toneInstructions[cfg.tone]);

  // 命格融入要求
  if (cfg.minggeA || cfg.minggeB) {
    parts.push(`要求：命格特质必须自然融入故事叙述，不能机械重复命格名称，要让读者感受到命格的性格本质。`);
  }

  if (cfg.minggeA && cfg.minggeB && cfg.minggeA === cfg.minggeB) {
    parts.push(`注意：两人命格相同，故事应体现镜像感——彼此是对方的影子，惺惺相惜中带着难以言说的不安。`);
  }

  parts.push([
    '写作风格要求：',
    '【禁止】',
    '- 禁止在一句话里堆叠超过两个形容词',
    '- 禁止使用以下词汇：怦然心动、心跳加速、灵魂、藤蔓、震耳欲聋、流淌（情绪类用法）',
    '- 禁止心理独白直接说破情绪，不写"她感到心痛"，只写行为和细节',
    '- 禁止每段都以情绪高潮结尾',
    '- 禁止用A/B称呼角色，用"他/她/对方"',
    '',
    '【坏例1——禁止这样写】',
    '她的心跳震耳欲聋，情绪如藤蔓般蔓延，灵魂深处的欲望怦然炸开，像一根被拨动的弦。',
    '',
    '【好例1——应该这样写】',

    '',

    '',
    '【好例2——应该这样写】',
    '去挽着他的胳膊，近乎哀求又撒娇地说，别喝了好不好，好不好嘛。他将我揽在怀里，一下又一下地抚摸我的头。',
    '',
    '【坏例3——禁止这样写】',

    '',
    '【好例3——应该这样写】',
    '我们的脸在黑暗中近在咫尺。他微微低下头，镜片后的眼睛对着我的眼睛。我不知道这个时候有什么更好的事情是可以做的，于是我让这个时间过去了。',
    '',
    '【坏例4——禁止这样写】',
    '他握住她的手，她的心脏剧烈跳动。他靠近她，她几乎无法呼吸。每一个瞬间都如此珍贵，如此令人窒息。',
    '',
    '【好例4——应该这样写】',
    '他时不时戳一下我的袜子。电影在继续，他喝尽了杯中酒，又喝掉了剩下的小半瓶。',
    '',
    '【好例5——模糊感，不下结论】',
    '但那欲望是如此强烈，甚至到第二天中午，和朋友打了一个多小时的电话，远离他那么久，才觉得平息了下来。但那上瘾的感觉无法忘却。',
    '',
    '输出要求：只输出故事正文，600到800字，现代爱情文学语言风格，不要标题，不要任何说明文字。'
  ].join('\n'));

  return `你是一个中文言情小说作家，擅长写情绪浓烈、细节精准的短篇言情片段。\n\n${parts.filter(Boolean).join('\n\n')}`;
}

// ══════════════════════════════
// BUILD TAGS for card
// ══════════════════════════════
function buildTags(cfg) {
  const tags = [];
  if (cfg.minggeA && cfg.minggeB) tags.push(`${cfg.minggeA} × ${cfg.minggeB}`);
  else if (cfg.minggeA) tags.push(cfg.minggeA);
  else if (cfg.minggeB) tags.push(cfg.minggeB);
  if (cfg.rel) tags.push(cfg.rel);
  if (cfg.relType) tags.push(cfg.relType);
  if (cfg.jobA && cfg.jobB) tags.push(`${cfg.jobA} × ${cfg.jobB}`);
  if (cfg.trigger) tags.push(cfg.trigger);
  return tags;
}

// ══════════════════════════════
// GENERATE
// ══════════════════════════════
async function startGenerate() {
  lastConfig = collectConfig();
  showScreen('generating');

  // Random haiku
  const haiku = HAIKUS[Math.floor(Math.random() * HAIKUS.length)];
  document.getElementById('gen-haiku').innerHTML = haiku.replace('\n', '<br>');

  try {
    const story = await callClaude(buildPrompt(lastConfig));
    renderResult(story, lastConfig);
    showScreen('result');
  } catch (e) {
    alert(e.message.includes('不允许') ? '呀咩咯！触发词包含不允许的内容，请修改后重试：（' : '生成失败：' + e.message);
    showScreen('config');
  }
}

async function callClaude(prompt) {
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ prompt, userTrigger: lastConfig.userTrigger }),
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error || res.statusText);
  }
  const data = await res.json();
  return data.story;
}

// ══════════════════════════════
// RENDER CARD
// ══════════════════════════════
function renderResult(story, cfg) {
  const wrap = document.getElementById('story-card-wrap');
  const tags = buildTags(cfg);
  const tagHTML = tags.map(t => `<span class="card-tag">${t}</span>`).join('');
  const toneLabel = { '轻甜': 'HE · 心动时刻', '虐恋': '虐恋 · 错过', '虐文': 'BE · 虐文' }[cfg.tone] || '';
  const now = new Date();
  const dateStr = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}`;
  const shareUrl = buildShareUrl(cfg);

  let cardHTML = '';

  if (cfg.tpl === 'plain') {
    cardHTML = `
    <div class="story-card card-plain" id="the-card">
      <div class="card-type">命格言情 · ${toneLabel}</div>
      <div class="card-tags">${tagHTML}</div>
      <div class="card-divider"></div>
      <div class="card-story">${story}</div>
      <div class="card-footer">
        <span class="card-watermark">命格言情</span>
        <div class="qr-wrap" id="qr-container"></div>
      </div>
    </div>`;
  } else if (cfg.tpl === 'sweet') {
    cardHTML = `
    <div class="story-card card-sweet" id="the-card">
      <div class="card-type">命格言情 · ${toneLabel}</div>
      <div class="card-tags">${tagHTML}</div>
      <div class="card-divider"></div>
      <div class="card-story">${story}</div>
      <div class="card-footer">
        <span class="card-date">${dateStr}</span>
        <div class="qr-wrap" id="qr-container"></div>
      </div>
    </div>`;
  } else {
    cardHTML = `
    <div class="story-card card-dark" id="the-card">
      <div class="bokeh bk1"></div>
      <div class="bokeh bk2"></div>
      <div class="bokeh bk3"></div>
      <div class="rain-layer" id="rain-layer"></div>
      <div class="card-type">命格言情 · ${toneLabel}</div>
      <div class="card-tags">${tagHTML}</div>
      <div class="card-divider"></div>
      <div class="card-story">${story}</div>
      <div class="card-footer">
        <div class="qr-wrap" id="qr-container"></div>
      </div>
    </div>`;
  }

  wrap.innerHTML = cardHTML;

  // Rain effect for dark card
  if (cfg.tpl === 'dark') {
    const rainLayer = document.getElementById('rain-layer');
    if (rainLayer) {
      for (let i = 0; i < 22; i++) {
        const line = document.createElement('div');
        line.style.cssText = `position:absolute;width:0.5px;background:linear-gradient(to bottom,transparent,#8ab,transparent);height:${25+Math.random()*35}px;left:${Math.random()*100}%;animation:rainFall ${0.5+Math.random()*0.9}s linear infinite;animation-delay:${-Math.random()*1.5}s;opacity:0.8`;
        rainLayer.appendChild(line);
      }
      if (!document.getElementById('rain-style')) {
        const s = document.createElement('style');
        s.id = 'rain-style';
        s.textContent = '@keyframes rainFall{from{transform:translateY(-50px)}to{transform:translateY(420px)}}';
        document.head.appendChild(s);
      }
    }
  }

  // QR code
  setTimeout(() => {
    const qrEl = document.getElementById('qr-container');
    if (qrEl) {
      qrEl.innerHTML = `<img src="https://github.com/Sylvan-Wang/AI_Romantic_Story_Generator/blob/main/http___romancegenerator.org.png" style="width:40px;height:40px;border-radius:2px;">`;
    }
  }, 100);
}

// ══════════════════════════════
// SHARE URL
// ══════════════════════════════
function buildShareUrl(cfg) {
  const encoded = btoa(encodeURIComponent(JSON.stringify(cfg)));
  return `${location.origin}${location.pathname}#s=${encoded}`;
}

function parseShareUrl() {
  const hash = location.hash;
  if (!hash.startsWith('#s=')) return null;
  try {
    return JSON.parse(decodeURIComponent(atob(hash.slice(3))));
  } catch { return null; }
}

// ══════════════════════════════
// SAVE CARD
// ══════════════════════════════
async function saveCard() {
  const card = document.getElementById('the-card');
  if (!card) return;
  try {
    const canvas = await html2canvas(card, {
      scale: 3, useCORS: true, backgroundColor: null,
      logging: false,
    });
    const link = document.createElement('a');
    link.download = `命格言情_${Date.now()}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  } catch (e) {
    alert('保存失败，请直接截图：' + e.message);
  }
}

// ══════════════════════════════
// INIT
// ══════════════════════════════
function init() {
  initTriggerCats();
  renderSystemPanels();
  const sharedCfg = parseShareUrl();
  if (sharedCfg) { showScreen('config'); }
}

init();
